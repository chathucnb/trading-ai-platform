version: '3.8'

services:
  app:
    build: .
    container_name: trading_app
    ports:
      - '3000:3000'
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://forex_user:forex_password@timescaledb:5432/forex_db
      - TWELVE_DATA_API_KEY=${TWELVE_DATA_API_KEY}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_ID_PRO=${STRIPE_PRICE_ID_PRO}
      - STRIPE_PRICE_ID_PREMIUM=${STRIPE_PRICE_ID_PREMIUM}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY}
      - NEXT_PUBLIC_WS_URL=ws://localhost:3000/ws
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: forex_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: forex_timescaledb
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: forex_db
      POSTGRES_USER: forex_user
      POSTGRES_PASSWORD: forex_password
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./src/lib/forex/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U forex_user -d forex_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  timescale_data:
